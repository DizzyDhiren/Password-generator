<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class = "main-container"> 
        <div class = "title-container">
            <h1>Generate a <br>
                <span class = "highlight">Random Password</span></h1> 
            <span> Never use and insecure passwords again!</span>
        </div>

        <div class = "button-container">
            <button class = "generate-btn" onclick="generatePasswords()">Generate Password</button>
        </div>

        <div class = "password-container">
            <button class = "password-box" id = "passwordOne" onclick = "copyPasswordOne()">Password 1</button>
            <button class = "password-box" id = "passwordTwo" onclick = "copyPasswordTwo()">Password 2</button>
        </div>

        <div> <p>click on a password to copy it</p></div>
       
    </div>
    
</body>
<script src="index.js"></script>
</html>
